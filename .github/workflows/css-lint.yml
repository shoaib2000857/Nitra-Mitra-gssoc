name: CSS Lint Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.css'

jobs:
  css-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install glob

      - name: Run custom CSS lint script
        run: node .github/scripts/css-lint.js